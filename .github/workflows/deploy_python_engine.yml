name: Deploy Python Engine to Azure VM

on:
  push:
    branches:
      - main
      - azure_test
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------
      # Login to Azure Container Registry
      # -------------------------------
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          registry: aesthetiqregistry.azurecr.io

      # -------------------------------
      # Build Docker images
      # -------------------------------
      - name: Build all Docker images
        working-directory: ./python_engine
        run: |
          # Build all services defined in docker-compose.prod.yml
          docker compose -f docker-compose.prod.yml build

      # -------------------------------
      # Push Docker images to ACR
      # -------------------------------
      - name: Push Docker images to ACR
        working-directory: ./python_engine
        run: |
          # Push all built images to Azure Container Registry
          docker compose -f docker-compose.prod.yml push

      # -------------------------------
      # Deploy to Azure VM via SSH
      # -------------------------------
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /srv/aesthetiq/project
            
            # Pull latest images from ACR
            docker compose -f docker-compose.prod.yml pull
            
            # Stop and remove old containers
            docker compose -f docker-compose.prod.yml down
            
            # Start services with new images
            docker compose -f docker-compose.prod.yml up -d
            
            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 10
            
            # Check service status
            docker compose -f docker-compose.prod.yml ps
            
            # Clean up unused Docker resources
            docker system prune -f
            
            # Show logs for verification
            docker compose -f docker-compose.prod.yml logs --tail=50
